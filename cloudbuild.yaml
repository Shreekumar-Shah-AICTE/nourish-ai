# Google Cloud Build configuration for NourishAI
# Builds and deploys to Cloud Run automatically

steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/nourish-ai:$COMMIT_SHA", "."]

  # Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/nourish-ai:$COMMIT_SHA"]

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "nourish-ai"
      - "--image"
      - "gcr.io/$PROJECT_ID/nourish-ai:$COMMIT_SHA"
      - "--region"
      - "asia-south1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "512Mi"
      - "--timeout"
      - "120"

images:
  - "gcr.io/$PROJECT_ID/nourish-ai:$COMMIT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
